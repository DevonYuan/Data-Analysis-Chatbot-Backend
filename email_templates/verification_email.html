<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your email address</title>
</head>

<body
    style="margin: 0; padding: 0; background-color: #f7f6f3; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
        style="background-color: #f7f6f3; padding: 48px 24px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                    style="max-width: 480px; background-color: #ffffff; border: 1px solid #e2ddd6; border-radius: 22px; box-shadow: 0 2px 6px rgba(26, 25, 22, 0.05), 0 16px 48px rgba(26, 25, 22, 0.08); overflow: hidden;">
                    <!-- Accent bar -->
                    <tr>
                        <td style="background-color: #c0442b; height: 4px; font-size: 0; line-height: 0;">&nbsp;</td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px 40px 32px;">
                            <p
                                style="margin: 0 0 8px; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; color: #c0442b; text-transform: none;">
                                EMAIL VERIFICATION</p>
                            <h1
                                style="margin: 0 0 20px; font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif; font-size: 2rem; line-height: 1.15; color: #1a1916;">
                                Verify your email</h1>
                            <p
                                style="margin: 0 0 28px; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 1rem; line-height: 1.65; color: #4a4740;">
                                Click the button below to verify your email address and get started with the Data
                                Analysis Chatbot.</p>
                            <table role="presentation" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td
                                        style="border-radius: 10px; background-color: #c0442b; box-shadow: 0 1px 3px rgba(192, 68, 43, 0.25), 0 4px 14px rgba(192, 68, 43, 0.18);">
                                        <a href="{{verification_link}}"
                                            style="display: inline-block; padding: 14px 28px; border-radius: 10px; background-color: #c0442b; color: #ffffff; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 0.9rem; font-weight: 500; text-decoration: none; text-align: center;">Verify
                                            Email</a>
                                    </td>
                                </tr>
                            </table>
                            <p
                                style="margin: 24px 0 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 0.82rem; color: #8a8479;">
                                This link will expire in 10 minutes. If you did not create an account, you can safely
                                ignore this email.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
